<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Chantier - Sélectionner la Langue</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="form-container glass-effect" style="max-width: 400px; text-align: center;">
        <div class="header-block" style="text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center;">
            <img src="logo_clean.png" alt="Lampertz Stone Designer" style="max-width: 250px; width: 100%; height: auto; filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.3)); margin-bottom: 0.5rem;">
            <div class="divider-line" style="width: 40px; height: 1px; background: #00e5ff; margin: 0.8rem auto 0.5rem auto; box-shadow: 0 0 8px #00e5ff;"></div>
            <h3 class="audit-title" style="margin: 0; font-size: 0.95rem; font-weight: 500; color: #fff; text-transform: uppercase; letter-spacing: 2px;">Audit Chantier</h3>
        </div>
        
        <!-- Language Selection Router -->
        <div id="language-selection">
            <h2 style="text-align: center; margin-bottom: 1.5rem; font-size: 1.2rem; line-height: 1.6;">
                Veuillez choisir votre langue<br>
                Bitte wählen Sie Ihre Sprache
            </h2>
            <div style="display: flex; gap: 1rem; justify-content: center; flex-direction: column;">
                <a href="fr.html" class="btn btn-primary" style="text-decoration: none; width: 100%;">Français</a>
                <a href="de.html" class="btn btn-primary" style="text-decoration: none; width: 100%;">Deutsch</a>
            </div>
        </div>
    </main>

</body>
</html>
